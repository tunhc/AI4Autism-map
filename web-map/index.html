<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI4Autism Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQGfQh2q4sGvWPOVbM0P9gFxyS5rEjw="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>AI4Autism Map</h1>
          <p>Trung tâm can thiệp, giáo dục hòa nhập và trường chuyên biệt tại Việt Nam</p>
        </div>
        <div class="stats" aria-label="Thống kê nhanh">
          <span><strong id="totalCount">0</strong> địa điểm</span>
          <span><strong id="readyCount">0</strong> ready</span>
          <span><strong id="verifyCount">0</strong> cần xác minh</span>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar" aria-label="Bộ lọc và danh sách">
          <section class="controls">
            <label class="field">
              <span>Tìm nhanh</span>
              <input id="searchInput" type="search" placeholder="Tên, địa chỉ, mô hình..." />
            </label>
            <div class="control-grid">
              <label class="field">
                <span>Tỉnh/TP</span>
                <select id="cityFilter"></select>
              </label>
              <label class="field">
                <span>Loại</span>
                <select id="layerFilter"></select>
              </label>
              <label class="field">
                <span>Trạng thái</span>
                <select id="statusFilter"></select>
              </label>
            </div>
          </section>

          <section class="result-tools">
            <strong id="resultCount">0 kết quả</strong>
            <button id="resetButton" type="button">Xóa lọc</button>
          </section>

          <section id="list" class="list" aria-label="Danh sách địa điểm"></section>
        </aside>

        <section class="map-area" aria-label="Bản đồ">
          <div id="map"></div>
          <article id="detailPanel" class="detail-panel" aria-live="polite">
            <button id="closeDetail" class="close-button" type="button" aria-label="Đóng chi tiết">×</button>
            <div id="detailContent" class="detail-content">
              <h2>Chọn một địa điểm</h2>
              <p>Bấm marker trên bản đồ hoặc chọn trong danh sách để xem thông tin nhanh.</p>
            </div>
          </article>
        </section>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
